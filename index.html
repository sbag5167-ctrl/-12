<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Master Tool</title>
    <style>
        :root { --primary: #bb86fc; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        
        /* Drop Zone */
        #dropZone { border: 2px dashed #444; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        #dropZone:hover { border-color: var(--primary); background: #252525; }
        #dropZone.active { border-color: #03dac6; background: #1a3333; }

        textarea { width: 100%; height: 120px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 10px; padding: 12px; box-sizing: border-box; resize: none; font-size: 0.9rem; }
        
        .control-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #aaa; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }

        .result-section { margin-top: 25px; }
        .res-label { font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        .res-box { background: #111; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.9rem; cursor: pointer; position: relative; border: 1px solid #333; transition: 0.2s; white-space: pre-wrap; margin-bottom: 15px; }
        .res-box:hover { border-color: var(--primary); }
        .res-box::after { content: '클릭 시 복사'; position: absolute; top: 5px; right: 10px; font-size: 0.7rem; color: #555; }

        .toast { position: fixed; bottom: 30px; background: #03dac6; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Prompt Master 🛠️</h2>
    
    <!-- 1. 이미지 드래그 기능 -->
    <div id="dropZone">
        이미지를 여기에 드래그하거나 클릭하세요<br>
        <span style="font-size: 0.8rem; color: #777;">(PixAI / NovelAI PNG 메타데이터 추출)</span>
    </div>
    <input type="file" id="fileInput" hidden accept="image/png">

    <!-- 2. 직접 입력 및 수정 -->
    <div class="control-group">
        <div class="slider-header">
            <span>태그/프롬프트 편집</span>
            <span>일괄 가중치: <b id="weightVal" style="color:#03dac6">1.00</b></span>
        </div>
        <textarea id="promptInput" placeholder="직접 프롬프트를 입력하거나 이미지를 올려주세요..."></textarea>
        <input type="range" id="weightSlider" min="0.5" max="1.5" step="0.05" value="1.0">
    </div>

    <!-- 3. 결과 창 -->
    <div class="result-section">
        <span class="res-label">PixAI & SD 일괄 변환</span>
        <div class="res-box" id="pixOut" onclick="copyText('pixOut')">입력 대기 중...</div>

        <span class="res-label">NovelAI (V4+) 일괄 변환</span>
        <div class="res-box" id="naiOut" onclick="copyText('naiOut')">입력 대기 중...</div>
    </div>
</div>

<div id="toast" class="toast">복사 성공!</div>

<script>
    const promptInput = document.getElementById('promptInput');
    const weightSlider = document.getElementById('weightSlider');
    const weightVal = document.getElementById('weightVal');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    // 1. 이미지 메타데이터 추출 로직
    async function readMetadata(file) {
        const buffer = await file.arrayBuffer();
        const view = new DataView(buffer);
        let textData = "";

        // PNG tEXt Chunk 탐색
        let offset = 8; 
        while (offset < view.byteLength) {
            let length = view.getUint32(offset);
            let type = "";
            for(let i=0; i<4; i++) type += String.fromCharCode(view.getUint8(offset + 4 + i));

            if (type === "tEXt" || type === "iTXt") {
                const chunkData = new Uint8Array(buffer, offset + 8, length);
                textData += new TextDecoder().decode(chunkData);
            }
            offset += length + 12;
        }

        // NovelAI 또는 스테이블 디퓨전(PixAI) 프롬프트 추출 시도
        let foundPrompt = "";
        if (textData.includes("Description")) foundPrompt = textData.split("Description")[1];
        else if (textData.includes("parameters")) foundPrompt = textData.split("parameters")[1];
        else if (textData.includes("Comment")) foundPrompt = textData.split("Comment")[1];
        
        promptInput.value = foundPrompt ? foundPrompt.trim().replace(/^[\0-\x1F]+/, '') : "프롬프트를 찾을 수 없거나 메타데이터가 없습니다.";
        update();
    }

    // 2. 가중치 변환 로직
    function update() {
        const weight = parseFloat(weightSlider.value).toFixed(2);
        weightVal.innerText = weight;
        let tags = promptInput.value.split(',').map(t => t.trim()).filter(t => t);

        if (tags.length === 0) return;

        // PixAI: (tag:weight)
        document.getElementById('pixOut').innerText = tags.map(t => `(${t}:${weight})`).join(', ');
        
        // NAI: weight::tag
        document.getElementById('naiOut').innerText = tags.map(t => `${weight}::${t}`).join(', ');
    }

    // 이벤트 리스너
    weightSlider.oninput = update;
    promptInput.oninput = update;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if(e.target.files[0]) readMetadata(e.target.files[0]); };
    
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
    dropZone.ondragleave = () => dropZone.classList.remove('active');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');
        if(e.dataTransfer.files[0]) readMetadata(e.dataTransfer.files[0]);
    };

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        const toast = document.getElementById('toast');
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }
</script>
</body>
</html>
